---
# Worker Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: nexusops
  labels:
    app: nexusops-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexusops-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nexusops-worker
    spec:
      serviceAccountName: nexusops-worker
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: nexusops/worker:latest
          ports:
            - containerPort: 3004
              name: health
          envFrom:
            - secretRef:
                name: nexusops-secrets
            - configMapRef:
                name: nexusops-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 15
---
# Worker Service (health only)
apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: nexusops
spec:
  selector:
    app: nexusops-worker
  ports:
    - port: 3004
      targetPort: 3004
      name: health
---
# Worker HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker
  namespace: nexusops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
# Worker ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexusops-worker
  namespace: nexusops
