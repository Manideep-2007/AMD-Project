---
# ConfigMap: non-secret environment variables
apiVersion: v1
kind: ConfigMap
metadata:
  name: nexusops-config
  namespace: nexusops
data:
  NODE_ENV: production
  LOG_LEVEL: info
  API_PORT: '3001'
  API_HOST: '0.0.0.0'
  CORS_ORIGIN: https://nexusops.dev
  RATE_LIMIT_MAX: '100'
  RATE_LIMIT_WINDOW_MS: '60000'
  WORKER_CONCURRENCY: '10'
  WORKER_HEALTH_PORT: '3004'
  PROXY_INTERNAL_URL: http://proxy:3003
  OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4318/v1/traces
  EMAIL_PROVIDER: sendgrid
  FROM_EMAIL: no-reply@nexusops.io
  DASHBOARD_URL: https://nexusops.dev
  REDIS_SENTINEL_NAME: nexusops-master
---
# Secret: sensitive values — populate via sealed-secrets or external-secrets operator
apiVersion: v1
kind: Secret
metadata:
  name: nexusops-secrets
  namespace: nexusops
type: Opaque
stringData:
  DATABASE_URL: REPLACE_ME
  REDIS_URL: REPLACE_ME
  REDIS_PASSWORD: REPLACE_ME
  REDIS_SENTINEL_HOSTS: REPLACE_ME
  JWT_SECRET: REPLACE_ME
  JWT_REFRESH_SECRET: REPLACE_ME
  COOKIE_SECRET: REPLACE_ME
  PROXY_INTERNAL_SECRET: REPLACE_ME
  DB_URL_ENCRYPTION_KEY: REPLACE_ME
  SENDGRID_API_KEY: REPLACE_ME
  ECC_WEBHOOK_SECRET: REPLACE_ME
---
# Ingress: TLS termination via cert-manager + nginx
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: nexusops-ingress
  namespace: nexusops
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 10m
    nginx.ingress.kubernetes.io/proxy-read-timeout: '60'
    nginx.ingress.kubernetes.io/websocket-services: api
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - nexusops.dev
        - api.nexusops.dev
      secretName: nexusops-tls
  rules:
    - host: api.nexusops.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 3001
