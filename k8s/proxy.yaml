---
# Proxy Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: proxy
  namespace: nexusops
  labels:
    app: nexusops-proxy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexusops-proxy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nexusops-proxy
    spec:
      serviceAccountName: nexusops-proxy
      terminationGracePeriodSeconds: 30
      containers:
        - name: proxy
          image: nexusops/proxy:latest
          ports:
            - containerPort: 3003
              name: http
          envFrom:
            - secretRef:
                name: nexusops-secrets
            - configMapRef:
                name: nexusops-config
          resources:
            requests:
              cpu: 500m
              memory: 256Mi
            limits:
              cpu: '2'
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3003
            initialDelaySeconds: 30
            periodSeconds: 15
---
# Proxy Service (internal only)
apiVersion: v1
kind: Service
metadata:
  name: proxy
  namespace: nexusops
spec:
  selector:
    app: nexusops-proxy
  ports:
    - port: 3003
      targetPort: 3003
      name: http
---
# Proxy HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: proxy
  namespace: nexusops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: proxy
  minReplicas: 2
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 65
---
# Proxy ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexusops-proxy
  namespace: nexusops
