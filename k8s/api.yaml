---
# API Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: nexusops
  labels:
    app: nexusops-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nexusops-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: nexusops-api
    spec:
      serviceAccountName: nexusops-api
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: nexusops/api:latest
          ports:
            - containerPort: 3001
              name: http
          envFrom:
            - secretRef:
                name: nexusops-secrets
            - configMapRef:
                name: nexusops-config
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: '1'
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: nexusops
spec:
  selector:
    app: nexusops-api
  ports:
    - port: 3001
      targetPort: 3001
      name: http
---
# API HPA
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: api
  namespace: nexusops
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: api
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
# API ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nexusops-api
  namespace: nexusops
