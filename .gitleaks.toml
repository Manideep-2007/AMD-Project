title = "NexusOps Gitleaks Configuration"

[extend]
# Extend the default gitleaks rules
useDefault = true

# ── NexusOps-specific secret patterns ────────────────────────────────────────
[[rules]]
id = "nexusops-api-key"
description = "NexusOps API Key"
regex = '''nxk_[A-Za-z0-9]{32,}'''
tags = ["key", "nexusops"]

[[rules]]
id = "nexusops-proxy-secret"
description = "NexusOps Proxy Internal Secret"
regex = '''PROXY_INTERNAL_SECRET\s*=\s*['"][^'"]{8,}['"]'''
tags = ["secret", "nexusops"]

[[rules]]
id = "nexusops-jwt-secret"
description = "NexusOps JWT Secret in config"
regex = '''JWT_SECRET\s*=\s*['"][^'"]{8,}['"]'''
tags = ["secret", "jwt"]

[[rules]]
id = "database-url-with-password"
description = "Database URL with embedded password"
regex = '''postgres(ql)?://[^:]+:[^@]+@[^/]+/[^\s'"]+'''
# Exclude well-known local-dev defaults and docker-compose env-var interpolations
allowedRegexes = [
  '''postgres(ql)?://postgres:postgres@''',        # standard Docker local-dev default - no real credential
  '''postgres(ql)?://[^:]+:\$\{[^}]+\}@''',      # docker-compose ${VAR} interpolation
  '''postgres(ql)?://postgres:\$\{POSTGRES_PASSWORD''', # parameterised compose credential
]
tags = ["database", "password"]

# ── Allowlisted paths ────────────────────────────────────────────────────────
# .env.example files are intentional TEMPLATES — they must show the shape of
# every required variable, so they are expected to contain realistic-looking
# placeholder values.  They must NEVER contain real credentials.
[allowlist]
  description = "Allow example/template and test files"
  paths = [
    '''\.env\.example$''',
    '''env\.example$''',
    # Directories named test/ or tests/
    '''(^|/)tests?/''',
    '''(^|/)__tests__/''',
    # Test files anywhere in the repo (e.g. apps/api/src/routes/workspace.test.ts)
    '''\.test\.[jt]sx?$''',
    '''\.spec\.[jt]sx?$''',
    '''\.gitleaks\.toml$''',
    # Documentation — placeholder values are expected; real secrets are reviewed in code review
    '''(^|/)docs/''',
    '''README.*\.md$''',
    '''SETUP\.md$''',
    '''ECC_SETUP\.md$''',
  ]
