version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: nexusops-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nexusops
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Queue + Cache)
  redis:
    image: redis:7-alpine
    container_name: nexusops-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # Jaeger (OpenTelemetry tracing)
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: nexusops-jaeger
    restart: unless-stopped
    ports:
      - '16686:16686' # Jaeger UI
      - '14268:14268' # Jaeger collector
    environment:
      COLLECTOR_OTLP_ENABLED: true

  # BullMQ Board (Queue monitoring UI)
  bullmq-board:
    image: deadly0/bull-board:latest
    container_name: nexusops-bullmq-board
    restart: unless-stopped
    ports:
      - '3002:3000'
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis

  # API Service
  # api:
  #   build:
  #     context: .
  #     dockerfile: ./apps/api/Dockerfile
  #   container_name: nexusops-api
  #   restart: unless-stopped
  #   ports:
  #     - '3001:3001'
